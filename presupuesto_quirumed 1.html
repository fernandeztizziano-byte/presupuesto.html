<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presupuesto QuiruMed S.R.L.</title>
<style>
  /* Reset y fuente base */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, sans-serif;
    font-size: 11px;
    background: #f0f0f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  /* Botón nuevo presupuesto - solo pantalla */
  @media screen {
    .btn-nuevo {
      margin-bottom: 12px;
      padding: 8px 20px;
      background: #2a7fa8;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
    }
    .btn-nuevo:hover { background: #1e5f80; }
  }

  /* Hoja A4 */
  .page {
    width: 210mm;
    min-height: 297mm;
    background: white;
    padding: 8mm 10mm;
    border: 1px solid #ccc;
    box-sizing: border-box;
  }

  /* HEADER */
  .header {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 6px;
    border: 1.5px solid #333;
    padding: 6px 8px;
    margin-bottom: 4px;
    align-items: center;
  }
  .header-left {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .logo-img {
    width: 160px;
    height: auto;
  }
  .header-left .direccion {
    font-size: 10px;
    color: #333;
    line-height: 1.4;
  }
  .header-left .iva-label {
    font-size: 9px;
    color: #555;
    font-style: italic;
  }

  /* X cuadro del medio */
  .header-center {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .x-box {
    width: 38px;
    height: 38px;
    background: #222;
    color: white;
    font-size: 24px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  /* Lado derecho header */
  .header-right {
    text-align: left;
    line-height: 1.6;
  }
  .titulo-presupuesto {
    font-size: 14px;
    font-weight: bold;
    text-align: center;
    letter-spacing: 1px;
    margin-bottom: 2px;
  }
  .numero-presupuesto {
    font-size: 13px;
    font-weight: bold;
    text-align: center;
    margin-bottom: 4px;
  }
  .numero-presupuesto span {
    border-bottom: 1px solid #333;
    min-width: 60px;
    display: inline-block;
  }
  .cuit-info {
    font-size: 9px;
    color: #333;
    line-height: 1.5;
  }

  /* Fecha */
  .fecha-row {
    display: flex;
    gap: 8px;
    margin-top: 4px;
    font-size: 10px;
  }
  .fecha-row label { font-weight: bold; }
  .fecha-row input {
    width: 30px;
    border: none;
    border-bottom: 1px solid #555;
    text-align: center;
    font-size: 10px;
    outline: none;
    background: transparent;
  }

  .no-factura {
    font-size: 8px;
    font-weight: bold;
    color: #222;
    margin-top: 3px;
    letter-spacing: 0.5px;
  }

  /* Datos cliente */
  .datos-cliente {
    border: 1.5px solid #333;
    border-top: none;
    padding: 5px 8px;
  }
  .datos-cliente .linea {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    margin-bottom: 3px;
    font-size: 10.5px;
  }
  .datos-cliente .linea label { white-space: nowrap; font-weight: 500; }
  .datos-cliente .linea input {
    flex: 1;
    border: none;
    border-bottom: 1px solid #666;
    outline: none;
    font-size: 10.5px;
    background: transparent;
    min-width: 0;
  }
  .datos-cliente .linea2 {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    align-items: flex-end;
  }
  .datos-cliente .linea2 .localidad-group {
    display: flex;
    gap: 4px;
    align-items: flex-end;
  }
  .datos-cliente .linea2 .localidad-group input {
    flex: 1;
    border: none;
    border-bottom: 1px solid #666;
    outline: none;
    font-size: 10.5px;
    background: transparent;
  }

  /* IVA y CUIT row */
  .iva-cuit-row {
    border: 1.5px solid #333;
    border-top: none;
    display: flex;
    align-items: center;
    padding: 4px 8px;
    gap: 12px;
  }
  .iva-group { display: flex; align-items: center; gap: 4px; font-size: 10px; flex-wrap: wrap; }
  .iva-group label { font-weight: bold; }
  .iva-group .opciones { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .iva-group .opciones label { font-weight: normal; display: flex; align-items: center; gap: 2px; cursor: pointer; }
  .divider-v { width: 1.5px; height: 32px; background: #333; }
  .cuit-group { display: flex; align-items: center; gap: 4px; font-size: 10px; }
  .cuit-group label { font-weight: bold; white-space: nowrap; }
  .cuit-group input {
    border: none;
    border-bottom: 1px solid #666;
    outline: none;
    font-size: 10px;
    width: 140px;
    background: transparent;
  }

  /* Condicion de venta */
  .condicion-row {
    border: 1.5px solid #333;
    border-top: none;
    display: flex;
    align-items: center;
    padding: 4px 8px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .condicion-group { display: flex; align-items: center; gap: 6px; font-size: 10px; }
  .condicion-group label { font-weight: bold; white-space: nowrap; }
  .condicion-group .opts { display: flex; gap: 6px; }
  .condicion-group .opts label { font-weight: normal; display: flex; align-items: center; gap: 2px; cursor: pointer; }
  .remito-group { display: flex; align-items: center; gap: 4px; font-size: 10px; margin-left: 16px; }
  .remito-group label { font-weight: bold; }
  .remito-group input {
    border: none;
    border-bottom: 1px solid #666;
    outline: none;
    font-size: 10px;
    width: 100px;
    background: transparent;
  }

  /* Tabla de items */
  .tabla-wrapper {
    border: 1.5px solid #333;
    border-top: none;
    position: relative;
  }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  thead tr th {
    border-bottom: 1.5px solid #333;
    padding: 5px 4px;
    text-align: center;
    font-size: 10.5px;
    letter-spacing: 0.5px;
    background: white;
  }
  thead tr th:nth-child(1) { width: 8%; border-right: 1px solid #aaa; }
  thead tr th:nth-child(2) { width: 64%; border-right: 1px solid #aaa; }
  thead tr th:nth-child(3) { width: 14%; border-right: 1px solid #aaa; }
  thead tr th:nth-child(4) { width: 14%; }

  tbody tr td {
    border-right: 1px solid #aaa;
    border-bottom: 1px solid #e0e0e0;
    padding: 2px 4px;
    vertical-align: middle;
  }
  tbody tr td:last-child { border-right: none; }
  tbody tr td input {
    width: 100%;
    border: none;
    outline: none;
    font-size: 10.5px;
    background: transparent;
    text-align: center;
  }
  /* div contenteditable para Detalle - hace wrap automatico */
  tbody tr td div.detalle {
    width: 100%;
    border: none;
    outline: none;
    font-size: 10.5px;
    background: transparent;
    text-align: left;
    min-height: 20px;
    line-height: 1.4;
    padding: 1px 2px;
    font-family: Arial, sans-serif;
    word-break: break-word;
    white-space: pre-wrap;
    cursor: text;
  }
  tbody tr td div.detalle:empty:before {
    content: attr(placeholder);
    color: #aaa;
  }
  tbody tr td:nth-child(2) input { text-align: left; }
  tbody tr td.total-cell {
    text-align: right;
    font-size: 10px;
    padding-right: 6px;
    color: #333;
  }
  /* Botones agregar/quitar fila - solo pantalla */
  @media screen {
    .btn-fila {
      display: inline-block;
      margin-left: 4px;
      padding: 0 6px;
      font-size: 14px;
      font-weight: bold;
      line-height: 1.4;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      vertical-align: middle;
    }
    .btn-fila-add { background: #2a7fa8; color: white; }
    .btn-fila-add:hover { background: #1e5f80; }
    .btn-fila-del { background: #c0392b; color: white; }
    .btn-fila-del:hover { background: #96281b; }
  }
  @media print {
    .btn-fila { display: none !important; }
    .fila-controles { display: none !important; }
  }

  /* Logo de agua en la tabla */
  .logo-agua {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 55%;
    opacity: 0.07;
    pointer-events: none;
    z-index: 0;
  }
  .tabla-wrapper { position: relative; }
  table { position: relative; z-index: 1; }

  /* Footer datos */
  .footer-datos {
    border: 1.5px solid #333;
    border-top: none;
    padding: 5px 8px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
  }
  .footer-izq { display: flex; flex-direction: column; gap: 3px; }
  .footer-izq .linea-footer {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    font-size: 10px;
  }
  .footer-izq .linea-footer label {
    font-size: 10px;
    white-space: nowrap;
  }
  .footer-izq .linea-footer input {
    flex: 1;
    border: none;
    border-bottom: 1px solid #666;
    outline: none;
    font-size: 10px;
    background: transparent;
    min-width: 120px;
  }
  .total-box {
    display: flex;
    align-items: center;
    gap: 6px;
    align-self: flex-start;
  }
  .total-box label {
    font-size: 13px;
    font-weight: bold;
    white-space: nowrap;
  }
  .total-box .total-valor {
    border: 2px solid #333;
    padding: 4px 8px;
    font-size: 13px;
    font-weight: bold;
    min-width: 90px;
    text-align: right;
    background: transparent;
    outline: none;
  }

  /* Sello y firma */
  .sello-row {
    border: 1.5px solid #333;
    border-top: none;
    padding: 6px 8px;
    display: flex;
    justify-content: flex-end;
    align-items: flex-end;
    gap: 12px;
    min-height: 70px;
  }
  .sello-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .sello-img {
    height: 60px;
    width: auto;
    opacity: 0.9;
  }
  .sello-label {
    font-size: 9px;
    color: #555;
    border-top: 1px solid #555;
    padding-top: 2px;
    width: 100%;
    text-align: center;
  }

  /* Print */
  @media print {
    html, body {
      background: white;
      padding: 0;
      margin: 0;
      height: 100%;
    }
    .btn-nuevo, .btn-print, .fila-controles { display: none !important; }
    .page {
      width: 100%;
      /* Sin min-height: el contenido define la altura */
      border: none;
      padding: 4mm 6mm;
      margin: 0;
      display: block; /* No flex en print, así no empuja el sello */
      box-sizing: border-box;
    }
    /* La tabla solo ocupa lo que necesita */
    .tabla-wrapper {
      /* sin flex-grow */
      height: auto;
    }
    /* Forzar que todo el presupuesto entre en UNA sola hoja */
    .page { page-break-inside: avoid; }
    @page {
      size: A4 portrait;
      margin: 0;
    }
  }

  /* Responsive mobile */
  @media screen and (max-width: 800px) {
    body { padding: 8px; background: #eee; }
    .page { width: 100%; min-height: unset; padding: 4mm 4mm; }
    .logo-img { width: 120px; }
  }
</style>
</head>

<script>
  // ---- Config ----
  let NUM_FILAS = 10; // filas iniciales
  const NUM_KEY = "quirumed_num";
  let filaCounter = 0; // ID único por fila

  // ---- Crear una fila nueva ----
  function crearFila() {
    const id = filaCounter++;
    const tr = document.createElement("tr");
    tr.style.height = "22px";
    tr.dataset.filaId = id;
    tr.innerHTML = `
      <td><input type="text" class="cant" data-id="${id}" placeholder=""></td>
      <td><div class="detalle" contenteditable="true" spellcheck="false"></div></td>
      <td><input type="text" class="punit" data-id="${id}" placeholder=""></td>
      <td class="total-cell" id="row-total-${id}"></td>
    `;
    tr.querySelectorAll(".cant, .punit").forEach(el => {
      el.addEventListener("input", calcularTotales);
    });
    return tr;
  }

  // ---- Init tabla ----
  function crearFilas() {
    const tbody = document.getElementById("tbody-items");
    tbody.innerHTML = "";
    filaCounter = 0;
    for (let i = 0; i < NUM_FILAS; i++) {
      tbody.appendChild(crearFila());
    }
    actualizarContadorFilas();
  }

  // ---- Agregar fila al final ----
  function agregarFila() {
    const tbody = document.getElementById("tbody-items");
    tbody.appendChild(crearFila());
    actualizarContadorFilas();
  }

  // ---- Quitar última fila (mínimo 1) ----
  function quitarFila() {
    const tbody = document.getElementById("tbody-items");
    if (tbody.rows.length <= 1) return;
    tbody.removeChild(tbody.lastElementChild);
    calcularTotales();
    actualizarContadorFilas();
  }

  function actualizarContadorFilas() {
    const n = document.getElementById("tbody-items").rows.length;
    const el = document.getElementById("cant-filas");
    if (el) el.textContent = `(${n} fila${n !== 1 ? "s" : ""})`;
  }

  // ---- Calcular totales recorriendo las filas actuales ----
  function calcularTotales() {
    let total = 0;
    document.querySelectorAll("#tbody-items tr").forEach(tr => {
      const id = tr.dataset.filaId;
      const cantEl = tr.querySelector(".cant");
      const punitEl = tr.querySelector(".punit");
      const tdTotal = document.getElementById("row-total-" + id);
      if (!cantEl || !punitEl || !tdTotal) return;
      const cant = parseMonto(cantEl.value);
      const punit = parseMonto(punitEl.value);
      const subtotal = cant * punit;
      tdTotal.textContent = subtotal > 0 ? formatMonto(subtotal) : "";
      total += subtotal;
    });
    document.getElementById("total-display").value = total > 0 ? formatMonto(total) : "";
    if (total > 0) {
      const sp = document.getElementById("son-pesos");
      if (!sp.dataset.manual) {
        sp.value = numeroALetras(total);
      }
    }
  }

  // ---- Helpers de monto ----
  function parseMonto(val) {
    val = val.replace(/\./g, "").replace(",", ".");
    const n = parseFloat(val);
    return isNaN(n) ? 0 : n;
  }

  function formatMonto(n) {
    if (n === 0) return "";
    return n.toLocaleString("es-AR", {minimumFractionDigits: 2, maximumFractionDigits: 2});
  }

  // ---- Nuevo número de presupuesto ----
  function nuevoPresupuesto() {
    let num = parseInt(localStorage.getItem(NUM_KEY) || "0") + 1;
    localStorage.setItem(NUM_KEY, num);
    document.getElementById("num-display").textContent = String(num).padStart(4, "0");
    // Limpiar form
    document.querySelectorAll("input[type=text]:not(#num-display)").forEach(el => el.value = "");
    document.querySelectorAll("input[type=checkbox]").forEach(el => el.checked = false);
    calcularTotales();
    // Setear fecha de hoy
    const hoy = new Date();
    document.getElementById("dia").value = String(hoy.getDate()).padStart(2,"0");
    document.getElementById("mes").value = String(hoy.getMonth()+1).padStart(2,"0");
    document.getElementById("anio").value = hoy.getFullYear();
  }

  // Marcar campo son-pesos como manual si el usuario escribe
  document.addEventListener("DOMContentLoaded", () => {
    crearFilas();
    // Cargar número guardado
    const saved = localStorage.getItem(NUM_KEY) || "0";
    document.getElementById("num-display").textContent = String(parseInt(saved)).padStart(4,"0");
    // Fecha de hoy por defecto
    const hoy = new Date();
    document.getElementById("dia").value = String(hoy.getDate()).padStart(2,"0");
    document.getElementById("mes").value = String(hoy.getMonth()+1).padStart(2,"0");
    document.getElementById("anio").value = hoy.getFullYear();

    document.getElementById("son-pesos").addEventListener("input", function() {
      this.dataset.manual = "1";
    });
  });

  // ---- Número a letras (básico, pesos argentinos) ----
  function numeroALetras(n) {
    const entero = Math.floor(n);
    const centavos = Math.round((n - entero) * 100);
    let texto = enLetras(entero) + " pesos";
    if (centavos > 0) texto += " con " + enLetras(centavos) + " centavos";
    return texto.charAt(0).toUpperCase() + texto.slice(1);
  }

  function enLetras(n) {
    if (n === 0) return "cero";
    const u = ["","uno","dos","tres","cuatro","cinco","seis","siete","ocho","nueve",
               "diez","once","doce","trece","catorce","quince","dieciséis","diecisiete",
               "dieciocho","diecinueve","veinte"];
    const d = ["","","veinti","treinta","cuarenta","cincuenta","sesenta","setenta","ochenta","noventa"];
    const c = ["","ciento","doscientos","trescientos","cuatrocientos","quinientos",
               "seiscientos","setecientos","ochocientos","novecientos"];
    if (n <= 20) return u[n];
    if (n < 100) {
      if (n < 30) return "veinti" + u[n-20];
      return d[Math.floor(n/10)] + (n%10 ? " y " + u[n%10] : "");
    }
    if (n === 100) return "cien";
    if (n < 1000) return c[Math.floor(n/100)] + (n%100 ? " " + enLetras(n%100) : "");
    if (n < 2000) return "mil" + (n%1000 ? " " + enLetras(n%1000) : "");
    if (n < 1000000) return enLetras(Math.floor(n/1000)) + " mil" + (n%1000 ? " " + enLetras(n%1000) : "");
    if (n < 2000000) return "un millón" + (n%1000000 ? " " + enLetras(n%1000000) : "");
    return enLetras(Math.floor(n/1000000)) + " millones" + (n%1000000 ? " " + enLetras(n%1000000) : "");
  }
</script>
